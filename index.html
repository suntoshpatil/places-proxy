<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NH Lead Finder</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0f; color: #f0ece4; font-family: 'DM Mono', monospace; padding-bottom: 60px; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    .header { background: linear-gradient(180deg,#111114 0%,transparent 100%); padding: 40px 24px 30px; border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 24px; }
    .badge { display: inline-block; background: #00e67615; border: 1px solid #00e67630; color: #00e676; font-size: 10px; font-weight: 700; letter-spacing: 2px; padding: 4px 10px; border-radius: 4px; margin-bottom: 14px; }
    h1 { font-family: 'Syne', sans-serif; font-size: clamp(26px,5vw,38px); font-weight: 900; line-height: 1.1; margin-bottom: 8px; }
    h1 span { color: #00e676; }
    .subtitle { color: #666; font-size: 12px; line-height: 1.6; }

    .container { max-width: 680px; margin: 0 auto; padding: 0 16px; }

    .controls { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 20px; margin-bottom: 20px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
    label { display: block; font-size: 10px; color: #555; letter-spacing: 1px; margin-bottom: 6px; }
    select { width: 100%; background: #1a1a1e; border: 1px solid rgba(255,255,255,0.1); color: #f0ece4; border-radius: 8px; padding: 10px 12px; font-size: 13px; font-family: 'DM Mono', monospace; cursor: pointer; appearance: none; }

    .btn { width: 100%; background: #00e676; color: #0d0d0f; border: none; border-radius: 10px; padding: 13px 0; font-size: 13px; font-family: 'Syne', sans-serif; font-weight: 800; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; }
    .btn:disabled { background: #1a1a1e; color: #444; cursor: not-allowed; }

    .error { color: #ff4d4d; font-size: 12px; margin-bottom: 16px; padding: 12px; background: rgba(255,77,77,0.1); border-radius: 8px; border: 1px solid rgba(255,77,77,0.3); }

    .summary-box { background: rgba(0,230,118,0.06); border: 1px solid rgba(0,230,118,0.2); border-radius: 12px; padding: 16px; margin-bottom: 20px; animation: fadeUp 0.4s ease both; }
    .summary-label { font-size: 10px; color: #00e676; letter-spacing: 1px; font-weight: 700; margin-bottom: 8px; }
    .summary-text { color: #ccc; font-size: 12px; line-height: 1.7; }

    .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 20px; animation: fadeUp 0.4s ease both; }
    .stat { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 14px 12px; text-align: center; }
    .stat-num { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 900; }
    .stat-label { font-size: 9px; color: #555; letter-spacing: 1px; }

    .leads-label { font-size: 10px; color: #444; letter-spacing: 1px; margin-bottom: 12px; }

    .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09); border-radius: 12px; padding: 16px 18px; cursor: pointer; transition: background 0.2s; margin-bottom: 10px; animation: fadeUp 0.4s ease both; }
    .card:hover { background: rgba(255,255,255,0.08); }
    .card-row { display: flex; align-items: center; gap: 14px; }
    .badge-circle { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 56px; height: 56px; border-radius: 50%; flex-shrink: 0; }
    .badge-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; }
    .badge-score { font-size: 16px; font-weight: 900; line-height: 1; }
    .card-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; color: #f0ece4; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-addr { font-size: 12px; color: #888; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag { border-radius: 4px; padding: 2px 7px; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; }
    .card-arrow { color: #555; font-size: 18px; flex-shrink: 0; margin-left: auto; }

    .card-detail { margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.07); display: none; }
    .card-detail.open { display: block; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 12px; margin-bottom: 14px; }
    .detail-label { color: #555; font-size: 10px; margin-bottom: 2px; letter-spacing: 0.5px; }
    .detail-value { color: #ccc; font-size: 12px; }
    .detail-value.highlight { color: #ff4d4d; font-weight: 700; }
    .pitch-label { color: #555; font-size: 10px; letter-spacing: 1px; margin-bottom: 6px; }
    .pitch-text { color: #aaa; font-style: italic; line-height: 1.6; font-size: 12px; }
    .website-link { color: #5b9cf6; font-size: 11px; word-break: break-all; }

    .shimmer { height: 82px; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); margin-bottom: 10px; animation: pulse 1.5s infinite; }

    .hidden { display: none; }
  </style>
</head>
<body>

<div class="header">
  <div class="container">
    <div class="badge">LIVE · GOOGLE PLACES DATA</div>
    <h1>NH Lead Finder<br><span>Real Businesses.</span></h1>
    <p class="subtitle">Live Google Places data · Scored by web presence weakness · Ready to pitch</p>
  </div>
</div>

<div class="container">
  <div class="controls">
    <div class="grid2">
      <div>
        <label>CITY</label>
        <select id="citySelect">
          <option>Bedford, NH</option>
          <option>Manchester, NH</option>
          <option>Nashua, NH</option>
          <option>Concord, NH</option>
          <option>Derry, NH</option>
          <option>Dover, NH</option>
          <option>Salem, NH</option>
          <option>Merrimack, NH</option>
          <option>Londonderry, NH</option>
          <option>Hudson, NH</option>
          <option>Keene, NH</option>
          <option>Portsmouth, NH</option>
        </select>
      </div>
      <div>
        <label>BUSINESS TYPE</label>
        <select id="typeSelect">
          <option value="restaurant">Restaurant</option>
          <option value="auto_repair">Auto Repair</option>
          <option value="plumber">Plumber</option>
          <option value="electrician">Electrician</option>
          <option value="landscaping">Landscaping</option>
          <option value="roofing_contractor">Roofing</option>
          <option value="dentist">Dentist</option>
          <option value="chiropractor">Chiropractor</option>
          <option value="hair_care">Hair Salon</option>
          <option value="nail_salon">Nail Salon</option>
          <option value="gym">Gym</option>
          <option value="pet_store">Pet Store</option>
          <option value="house_cleaning">Cleaning Service</option>
          <option value="hvac_contractor">HVAC</option>
          <option value="painter">Painting</option>
          <option value="real_estate_agency">Real Estate</option>
          <option value="accounting">Accountant</option>
          <option value="lawyer">Lawyer</option>
        </select>
      </div>
    </div>
    <button class="btn" id="searchBtn" onclick="runSearch()">FIND REAL LEADS →</button>
  </div>

  <div id="errorBox" class="error hidden"></div>

  <div id="summaryBox" class="summary-box hidden">
    <div class="summary-label">⚡ AI TACTICAL SUMMARY</div>
    <div class="summary-text" id="summaryText"></div>
  </div>

  <div id="statsBox" class="stats hidden">
    <div class="stat">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">REAL BUSINESSES</div>
    </div>
    <div class="stat">
      <div class="stat-num" style="color:#00e676" id="statHot">0</div>
      <div class="stat-label">HOT LEADS</div>
    </div>
    <div class="stat">
      <div class="stat-num" style="color:#ff4d4d" id="statNoSite">0</div>
      <div class="stat-label">NO WEBSITE</div>
    </div>
  </div>

  <div id="loadingBox" class="hidden">
    <div class="shimmer"></div>
    <div class="shimmer" style="animation-delay:0.1s"></div>
    <div class="shimmer" style="animation-delay:0.2s"></div>
    <div class="shimmer" style="animation-delay:0.3s"></div>
    <div class="shimmer" style="animation-delay:0.4s"></div>
  </div>

  <div id="leadsContainer"></div>
</div>

<script>
  const WEAKNESS_LABELS = { noWebsite:"No Website", lowRating:"Low Rating", fewReviews:"Few Reviews", noPhone:"No Phone Listed" };
  const WEAKNESS_COLORS = { noWebsite:"#ff4d4d", lowRating:"#ff8c00", fewReviews:"#ffd700", noPhone:"#cc88ff" };

  function scoreWeaknesses(biz) {
    const w = [];
    if (!biz.website) w.push("noWebsite");
    if (biz.rating && biz.rating < 4.0) w.push("lowRating");
    if (!biz.user_ratings_total || biz.user_ratings_total < 15) w.push("fewReviews");
    if (!biz.formatted_phone_number) w.push("noPhone");
    return w;
  }

  function opportunityScore(w) {
    let s = 0;
    if (w.includes("noWebsite")) s += 50;
    if (w.includes("lowRating")) s += 20;
    if (w.includes("fewReviews")) s += 20;
    if (w.includes("noPhone")) s += 10;
    return Math.min(s, 100);
  }

  function pitchLine(weaknesses, name) {
    if (weaknesses.includes("noWebsite")) return `${name} has no website — I build clean, affordable sites for NH small businesses that turn Google searches into real customers.`;
    if (weaknesses.includes("fewReviews")) return `${name} only has a handful of reviews. I set up simple automated review systems that help local businesses build trust fast.`;
    if (weaknesses.includes("lowRating")) return `I noticed ${name}'s rating has room to grow. I help businesses improve their online reputation with easy tools.`;
    return `Hi, I help local NH businesses strengthen their online presence — happy to chat about ${name}.`;
  }

  function renderCard(biz, index) {
    const weaknesses = scoreWeaknesses(biz);
    const score = opportunityScore(weaknesses);
    const color = score >= 60 ? "#00e676" : score >= 30 ? "#ffd700" : "#888";
    const label = score >= 60 ? "HOT" : score >= 30 ? "WARM" : "COOL";

    const tagsHtml = weaknesses.length
      ? weaknesses.map(w => `<span class="tag" style="background:${WEAKNESS_COLORS[w]}22;color:${WEAKNESS_COLORS[w]};border:1px solid ${WEAKNESS_COLORS[w]}55">${WEAKNESS_LABELS[w]}</span>`).join("")
      : `<span style="color:#555;font-size:11px">Strong presence — low priority</span>`;

    const websiteRow = biz.website
      ? `<div style="grid-column:1/-1"><a href="${biz.website}" target="_blank" class="website-link">${biz.website}</a></div>`
      : "";

    return `
      <div class="card" style="animation-delay:${index*0.05}s" onclick="toggleCard(this)">
        <div class="card-row">
          <div class="badge-circle" style="border:2px solid ${color}">
            <span class="badge-label" style="color:${color}">${label}</span>
            <span class="badge-score" style="color:${color}">${score}</span>
          </div>
          <div style="flex:1;min-width:0">
            <div class="card-name">${biz.name}</div>
            <div class="card-addr">${biz.vicinity || "—"}</div>
            <div class="tags">${tagsHtml}</div>
          </div>
          <div class="card-arrow">▼</div>
        </div>
        <div class="card-detail">
          <div class="detail-grid">
            <div>
              <div class="detail-label">Rating</div>
              <div class="detail-value">${biz.rating ? `${biz.rating} ⭐ (${biz.user_ratings_total} reviews)` : "No rating"}</div>
            </div>
            <div>
              <div class="detail-label">Phone</div>
              <div class="detail-value ${!biz.formatted_phone_number ? 'highlight' : ''}">${biz.formatted_phone_number || "❌ Not listed"}</div>
            </div>
            <div>
              <div class="detail-label">Website</div>
              <div class="detail-value ${!biz.website ? 'highlight' : ''}">${biz.website ? "✅ Has one" : "❌ None"}</div>
            </div>
            <div>
              <div class="detail-label">Open Now</div>
              <div class="detail-value">${biz.opening_hours?.open_now === true ? "✅ Open" : biz.opening_hours?.open_now === false ? "🔴 Closed" : "—"}</div>
            </div>
            ${websiteRow}
          </div>
          <div class="pitch-label">⚡ YOUR PITCH ANGLE</div>
          <div class="pitch-text">${pitchLine(weaknesses, biz.name)}</div>
        </div>
      </div>
    `;
  }

  function toggleCard(el) {
    const detail = el.querySelector(".card-detail");
    const arrow = el.querySelector(".card-arrow");
    detail.classList.toggle("open");
    arrow.textContent = detail.classList.contains("open") ? "▲" : "▼";
  }

  function show(id) { document.getElementById(id).classList.remove("hidden"); }
  function hide(id) { document.getElementById(id).classList.add("hidden"); }
  function setError(msg) { const el = document.getElementById("errorBox"); el.textContent = msg; show("errorBox"); }

  async function runSearch() {
    const city = document.getElementById("citySelect").value;
    const type = document.getElementById("typeSelect").value;
    const btn = document.getElementById("searchBtn");

    btn.disabled = true;
    btn.textContent = "SCANNING GOOGLE PLACES...";
    hide("errorBox");
    hide("summaryBox");
    hide("statsBox");
    document.getElementById("leadsContainer").innerHTML = "";
    show("loadingBox");

    try {
      // Step 1: Geocode
      const geoRes = await fetch(`/api/places?endpoint=geocode/json&address=${encodeURIComponent(city)}`);
      const geoData = await geoRes.json();
      if (!geoData.results?.length) throw new Error("Could not find that city.");
      const { lat, lng } = geoData.results[0].geometry.location;

      // Step 2: Nearby search
      const nearbyRes = await fetch(`/api/places?endpoint=place/nearbysearch/json&location=${lat},${lng}&radius=8000&type=${type}`);
      const nearbyData = await nearbyRes.json();
      if (!nearbyData.results?.length) throw new Error("No businesses found. Try a different type.");

      // Step 3: Get details
      const top = nearbyData.results.slice(0, 15);
      const detailed = await Promise.all(top.map(async place => {
        try {
          const r = await fetch(`/api/places?endpoint=place/details/json&place_id=${place.place_id}&fields=name,vicinity,rating,user_ratings_total,website,formatted_phone_number,opening_hours`);
          const d = await r.json();
          return { ...place, ...d.result };
        } catch { return place; }
      }));

      // Sort by score
      const sorted = detailed.sort((a,b) => opportunityScore(scoreWeaknesses(b)) - opportunityScore(scoreWeaknesses(a)));
      const hotLeads = sorted.filter(b => opportunityScore(scoreWeaknesses(b)) >= 60);
      const noSite = sorted.filter(b => !b.website);

      // Render stats
      document.getElementById("statTotal").textContent = sorted.length;
      document.getElementById("statHot").textContent = hotLeads.length;
      document.getElementById("statNoSite").textContent = noSite.length;
      show("statsBox");

      // Render cards
      hide("loadingBox");
      document.getElementById("leadsContainer").innerHTML = `
        <div class="leads-label">SORTED BY OPPORTUNITY · TAP TO EXPAND</div>
        ${sorted.map((biz, i) => renderCard(biz, i)).join("")}
      `;

      // AI Summary
      document.getElementById("summaryText").textContent = "Analyzing leads...";
      show("summaryBox");

      const summaryResp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: "You are a sales coach helping a freelance web/AI consultant in NH find cold outreach targets. Be direct, punchy, actionable. 3-4 sentences. No bullet points.",
          messages: [{ role:"user", content:`Searched for ${type} in ${city}. Found ${sorted.length} businesses. ${hotLeads.length} hot leads. ${noSite.length} have no website. Hot leads: ${hotLeads.map(b=>b.name).join(", ")||"none"}. Give me a tactical summary.` }]
        })
      });
      const sumData = await summaryResp.json();
      document.getElementById("summaryText").textContent = sumData.content?.find(b=>b.type==="text")?.text || "Search complete.";

    } catch(e) {
      hide("loadingBox");
      setError(e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = "FIND REAL LEADS →";
    }
  }
</script>
</body>
</html>
